<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Tree Lyrics Flashcards</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 구글 폰트 임포트: 영어용 귀여운 'Fredoka', 한국어용 귀여운 'Gamja Flower' -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Gamja+Flower&display=swap');
        
        body {
            font-family: 'Fredoka', 'Gamja Flower', sans-serif;
            background-color: #fefce8; /* 연한 노란색 배경 */
            user-select: none;
        }

        .font-cute-ko {
            font-family: 'Gamja Flower', sans-serif;
        }

        .font-cute-en {
            font-family: 'Fredoka', sans-serif;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        /* 3D 카드 뒤집기 애니메이션 효과 */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 15px 35px -5px rgba(234, 179, 8, 0.15), 0 10px 15px -6px rgba(234, 179, 8, 0.1);
            transition: all 0.3s ease;
        }

        /* 귀여운 테두리 및 그림자 효과 */
        .card-front {
            background-color: white;
            border: 4px solid #fef08a; /* Yellow-200 */
        }

        .card-front:hover {
            border-color: #fde047; /* Yellow-300 */
            transform: translateY(-2px);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fef08a; /* Yellow-200 */
            border: 4px solid #fde047; /* Yellow-300 */
        }

        /* 귀여운 커스텀 슬라이더 스타일링 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #eab308;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-6 selection:bg-yellow-200">

    <!-- Header -->
    <header class="text-center mt-4 mb-6">
        <div class="inline-flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-full mb-2 border border-yellow-200 shadow-sm animate-bounce">
            <span class="text-2xl">🍋</span>
            <span class="text-sm font-bold text-yellow-800 tracking-wider">LET'S SING IN ENGLISH!</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-yellow-800 tracking-tight font-cute-en">Lemon Tree</h1>
        <p class="text-yellow-600 font-semibold text-lg font-cute-ko">Fools Garden | 가사 완벽 마스터</p>
    </header>

    <!-- Flashcard Area -->
    <main class="w-full max-w-xl aspect-[16/10] perspective-1000 my-auto">
        <div id="card" class="card-inner" onclick="flipCard()">
            
            <!-- Front (English Lyric) -->
            <div class="card-face card-front">
                <div class="absolute top-4 left-6 text-xs font-bold text-yellow-500 uppercase tracking-widest font-cute-en">
                    English Lyric
                </div>
                <!-- Speaker Active Wave Ring -->
                <div class="absolute top-4 right-6 flex items-center gap-1.5 bg-yellow-50 px-3 py-1 rounded-full border border-yellow-100">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                    </span>
                    <span class="text-[10px] font-bold text-yellow-600 uppercase font-cute-en">TTS Active</span>
                </div>

                <div class="text-center px-4">
                    <p id="front-text" class="text-2xl md:text-3.5xl font-bold text-gray-800 leading-snug tracking-wide font-cute-en"></p>
                </div>

                <!-- Replay Audio Button -->
                <button onclick="event.stopPropagation(); replayTTS();" class="absolute bottom-6 p-3 rounded-full bg-yellow-50 hover:bg-yellow-100 text-yellow-600 transition-all hover:scale-110 active:scale-95 shadow-sm" title="다시 듣기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>
            </div>

            <!-- Back (Korean Translation) -->
            <div class="card-face card-back">
                <div class="absolute top-4 left-6 text-xs font-bold text-yellow-800 uppercase tracking-widest font-cute-en">
                    Translation
                </div>
                <div class="text-center px-4 w-full">
                    <p id="back-text" class="text-3xl md:text-4.5xl lg:text-5.5xl font-bold text-yellow-950 leading-relaxed font-cute-ko break-keep"></p>
                </div>
                <!-- Replay Audio Button also on back for convenience -->
                <button onclick="event.stopPropagation(); replayTTS();" class="absolute bottom-6 p-3 rounded-full bg-white/80 hover:bg-white text-yellow-700 transition-all hover:scale-110 active:scale-95 shadow-sm" title="영어 다시 듣기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Control Panels & Keyboard shortcuts -->
    <footer class="w-full max-w-xl flex flex-col items-center gap-5 mt-6 mb-4">
        
        <!-- Navigation Buttons -->
        <div class="flex items-center gap-6">
            <button onclick="prevCard()" class="p-4 rounded-2xl bg-white border-2 border-yellow-300 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-400 transition-all active:scale-90 shadow-sm" title="이전 (왼쪽 화살표)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            
            <div class="px-6 py-2 bg-yellow-200/60 rounded-2xl font-bold text-yellow-800 text-sm shadow-inner font-cute-en">
                <span id="current-index" class="text-lg">1</span> / <span id="total-count" class="text-lg">39</span>
            </div>
            
            <button onclick="nextCard()" class="p-4 rounded-2xl bg-white border-2 border-yellow-300 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-400 transition-all active:scale-90 shadow-sm" title="다음 (오른쪽 화살표)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- TTS Control Panel -->
        <div class="w-full bg-white/75 backdrop-blur-sm border border-yellow-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm">
            <!-- Speed Control -->
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-yellow-800 font-cute-ko">🗣️ 재생 속도</span>
                <input id="speed-range" type="range" min="0.7" max="1.2" step="0.1" value="0.9" onchange="updateSpeedLabel(this.value)" class="w-24 h-2 bg-yellow-200 rounded-lg appearance-none cursor-pointer">
                <span id="speed-label" class="text-xs font-bold text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded font-cute-en">0.9x</span>
            </div>

            <!-- Auto Play Toggle -->
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="auto-play-toggle" class="sr-only peer" checked>
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-500"></div>
                <span class="ml-3 text-sm font-bold text-yellow-800 font-cute-ko">카드를 넘기면 자동 발음 재생</span>
            </label>
        </div>

        <!-- Shortcuts Hint -->
        <div class="hidden md:flex gap-4 text-xs font-bold text-yellow-700 uppercase tracking-wider opacity-80 font-cute-en">
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">Space: Flip Card</span>
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">← : Prev Lyric</span>
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">→ : Next Lyric</span>
        </div>
        
        <!-- Mobile Hint -->
        <div class="flex md:hidden text-xs font-bold text-yellow-700 opacity-80 font-cute-ko">
            <span>💡 화면을 좌우로 밀어서(스와이프) 넘길 수도 있어요!</span>
        </div>
    </footer>

    <script>
        // Lemon Tree 전곡 가사 전체 리스트 (학습용 직관적 번역 적용)
        const lyrics = [
            // [1절]
            { front: "I'm sitting here in a boring room", back: "나는 여기 지루한 방에 앉아 있어" },
            { front: "It's just another rainy Sunday afternoon", back: "그저 평소와 다름없는 비 내리는 일요일 오후일 뿐이야" },
            { front: "I'm wasting my time, I got nothing to do", back: "나는 시간을 낭비하고 있어, 할 일이 아무것도 없거든" },
            { front: "I'm hanging around, I'm waiting for you", back: "나는 주변을 서성거리며 너를 기다리고 있어" },
            { front: "But nothing ever happens", back: "하지만 아무 일도 일어나지 않아" },
            { front: "And I wonder", back: "그리고 난 궁금해져" },
            // [2절]
            { front: "I'm driving around in my car", back: "나는 내 차를 타고 돌아다니고 있어" },
            { front: "I'm driving too fast, I'm driving too far", back: "너무 빨리, 너무 멀리 운전하고 있어" },
            { front: "I'd like to change my point of view", back: "나는 나의 관점을 바꾸고 싶어" },
            { front: "I feel so lonely, I'm waiting for you", back: "나는 정말 외로움을 느껴, 너를 기다리고 있어" },
            { front: "But nothing ever happens", back: "하지만 아무 일도 일어나지 않아" },
            { front: "And I wonder", back: "그리고 난 궁금해져" },
            // [후렴 1]
            { front: "I wonder how, I wonder why", back: "어떻게 그럴 수 있는지, 왜 그런지 궁금해" },
            { front: "Yesterday you told me 'bout the blue, blue sky", back: "어제 넌 나에게 저 파랗고 파란 하늘에 대해 말해줬지" },
            { front: "And all that I can see is just a yellow lemon tree", back: "하지만 내가 볼 수 있는 전부는 그저 노란 레몬 나무뿐이야" },
            { front: "I'm turning my head up and down", back: "나는 고개를 위아래로 움직이고 있어" },
            { front: "I'm turning, turning, turning, turning, turning around", back: "나는 제자리에서 돌고, 돌고, 돌고, 돌고, 돌고 있어" },
            { front: "And all that I can see is just a yellow lemon tree", back: "하지만 내가 볼 수 있는 전부는 그저 노란 레몬 나무뿐이야" },
            // [과도기 허밍]
            { front: "Dap-da-da-da-da-di-da-da, da-da-da-da-di-da-da, dap-di-dir-ri-da", back: "(노래의 신나는 허밍 부분입니다 🎵)" },
            // [3절]
            { front: "I'm sitting here, I miss the power", back: "나는 여기 앉아 있어, 나는 그 힘(에너지)이 그리워" },
            { front: "I'd like to go out, taking a shower", back: "밖으로 나가서 샤워를 하고 싶어" },
            { front: "But there's a heavy cloud inside my head", back: "하지만 내 머릿속에는 무거운 구름이 끼어 있어" },
            { front: "I feel so tired, put myself into bed", back: "나는 너무 피곤함을 느끼며, 나 자신을 침대에 눕혀" },
            { front: "Where nothing ever happens", back: "아무 일도 일어나지 않는 곳에서" },
            { front: "And I wonder", back: "그리고 난 궁금해져" },
            // [브릿지]
            { front: "Isolation is not good for me", back: "고립(혼자 있는 것)은 나에게 좋지 않아" },
            { front: "Isolation, I don't want to sit on a lemon tree", back: "고립, 나는 레몬 나무 위에 앉아 있고 싶지 않아" },
            { front: "I'm stepping around in a desert of joy", back: "나는 기쁨의 사막을 걸어 다니고 있어" },
            { front: "Baby, anyhow I'll get another toy", back: "그대여, 어쨌든 나는 또 다른 장난감(우울함을 달래줄 새로운 대안이나 인연)을 얻을 거야" },
            { front: "And everything will happen", back: "그러면 모든 일들이 일어나겠지" },
            { front: "And you wonder", back: "그리고 넌 궁금해하겠지" },
            // [후렴 2]
            { front: "I wonder how, I wonder why", back: "어떻게 그럴 수 있는지, 왜 그런지 궁금해" },
            { front: "Yesterday you told me 'bout the blue, blue sky", back: "어제 넌 나에게 저 파랗고 파란 하늘에 대해 말해줬지" },
            { front: "And all that I can see is just a yellow lemon tree", back: "하지만 내가 볼 수 있는 전부는 그저 노란 레몬 나무뿐이야" },
            { front: "I'm turning my head up and down", back: "나는 고개를 위아래로 움직이고 있어" },
            { front: "I'm turning, turning, turning, turning, turning around", back: "나는 제자리에서 돌고, 돌고, 돌고, 돌고, 돌고 있어" },
            { front: "And all that I can see is just a yellow lemon tree", back: "하지만 내가 볼 수 있는 전부는 그저 노란 레몬 나무뿐이야" },
            // [아웃로]
            { front: "And I wonder, wonder", back: "그리고 난 궁금해, 궁금해" },
            { front: "I wonder how, I wonder why", back: "어떻게 그럴 수 있는지, 왜 그런지 궁금해" },
            { front: "Yesterday you told me 'bout the blue, blue sky", back: "어제 넌 나에게 저 파랗고 파란 하늘에 대해 말해줬지" },
            { front: "And all that I can see", back: "그리고 내가 볼 수 있는 전부" },
            { front: "And all that I can see", back: "그리고 내가 볼 수 있는 전부" },
            { front: "And all that I can see is just a yellow lemon tree", back: "그리고 내가 볼 수 있는 전부는 그저 노란 레몬 나무뿐이야" }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let speechRate = 0.9;

        const card = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const currentIndexDisplay = document.getElementById('current-index');
        const totalCountDisplay = document.getElementById('total-count');
        const speedRange = document.getElementById('speed-range');
        const speedLabel = document.getElementById('speed-label');
        const autoPlayToggle = document.getElementById('auto-play-toggle');

        // 모바일 기기에서의 터치 스와이프 탐색 지원
        let touchStartX = 0;
        let touchEndX = 0;

        card.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        card.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const threshold = 50; // 스와이프 감도
            if (touchEndX < touchStartX - threshold) {
                // 왼쪽으로 묾 -> 다음 카드
                nextCard();
            } else if (touchEndX > touchStartX + threshold) {
                // 오른쪽으로 묾 -> 이전 카드
                prevCard();
            }
        }

        // 목소리 억양 안정화 및 중복 음성 제어
        function playTTS(text) {
            if (!('speechSynthesis' in window)) return;
            
            // 현재 실행 중인 모든 말하기 취소
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = speechRate;
            
            // 브라우저별 최적의 목소리 매핑 시도
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Google'));
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        function replayTTS() {
            playTTS(lyrics[currentIndex].front);
        }

        function updateSpeedLabel(val) {
            speechRate = parseFloat(val);
            speedLabel.innerText = val + 'x';
        }

        // 카드를 업데이트하고, 영어 문장이 보여지는 앞면에서 즉각 TTS를 재생시킵니다.
        function updateCard() {
            isFlipped = false;
            card.classList.remove('is-flipped');
            
            // 텍스트 매핑
            frontText.innerText = lyrics[currentIndex].front;
            backText.innerText = lyrics[currentIndex].back;
            
            // 페이지 넘버 갱신
            currentIndexDisplay.innerText = currentIndex + 1;
            totalCountDisplay.innerText = lyrics.length;

            // 영어 가사가 바로 보이는 앞면으로 갱신될 때 TTS 자동 재생
            if (autoPlayToggle.checked) {
                playTTS(lyrics[currentIndex].front);
            }
        }

        // 카드 뒤집기 (앞면에서 뒷면으로, 또는 뒷면에서 앞면으로)
        function flipCard() {
            isFlipped = !isFlipped;
            card.classList.toggle('is-flipped');
            
            // 뒤집었을 때 만약 '영어 앞면'으로 돌아왔다면 원어민 발음 리마인드 재생
            if (!isFlipped && autoPlayToggle.checked) {
                playTTS(lyrics[currentIndex].front);
            }
        }

        function nextCard() {
            if (currentIndex < lyrics.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                // 마지막 카드인 경우 첫 번째로 루프 처리
                currentIndex = 0;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            } else {
                // 첫 카드인 경우 마지막으로 루프 처리
                currentIndex = lyrics.length - 1;
                updateCard();
            }
        }

        // 키보드 방향키 및 스페이스바 이벤트 매핑
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // 스페이스바 스크롤 방지
                flipCard();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        // 음성 라이브러리가 뒤늦게 로딩되는 이슈 방지
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                // 초기 목소리 로드 완료 후 한번 더 감지 보장
            };
        }

        // 앱 초기 시작
        window.onload = function() {
            updateCard();
        }
    </script>
</body>
</html>
