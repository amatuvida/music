<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Lemon Tree Lyrics Flashcards</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 구글 폰트 임포트: 영어용 'Fredoka', 한국어용 'Gamja Flower' -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Gamja+Flower&display=swap');
        
        body {
            font-family: 'Fredoka', 'Gamja Flower', sans-serif;
            background-color: #fefce8; /* 연한 노란색 배경 */
            user-select: none;
        }

        .font-cute-ko {
            font-family: 'Gamja Flower', sans-serif;
        }

        .font-cute-en {
            font-family: 'Fredoka', sans-serif;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        /* 3D 카드 뒤집기 애니메이션 효과 */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 15px 35px -5px rgba(234, 179, 8, 0.15), 0 10px 15px -6px rgba(234, 179, 8, 0.1);
            transition: all 0.3s ease;
        }

        /* 귀여운 테두리 및 그림자 효과 */
        .card-front {
            background-color: white;
            border: 4px solid #fef08a; /* Yellow-200 */
        }

        .card-front:hover {
            border-color: #fde047; /* Yellow-300 */
            transform: translateY(-2px);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fef08a; /* Yellow-200 */
            border: 4px solid #fde047; /* Yellow-300 */
        }

        /* 귀여운 커스텀 슬라이더 스타일링 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #eab308;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* 숨겨진 유튜브 플레이어 영역 스타일 */
        .youtube-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 비율 */
            overflow: hidden;
            border-radius: 1rem;
            border: 3px solid #fef08a;
        }
        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-6 selection:bg-yellow-200">

    <!-- Header -->
    <header class="text-center mt-2 mb-4">
        <div class="inline-flex items-center gap-2 bg-yellow-100 px-4 py-1.5 rounded-full mb-1.5 border border-yellow-200 shadow-sm animate-bounce">
            <span class="text-xl">🍋</span>
            <span class="text-xs font-bold text-yellow-800 tracking-wider">SING WITH REAL MUSIC!</span>
        </div>
        <h1 class="text-3.5xl md:text-5xl font-extrabold text-yellow-800 tracking-tight font-cute-en">Lemon Tree</h1>
        <p class="text-yellow-600 font-semibold text-base font-cute-ko">Fools Garden | 전곡 완벽 자막 싱크 학습기</p>
    </header>

    <!-- Mode Selection Tab -->
    <div class="w-full max-w-xl bg-yellow-100 p-1.5 rounded-2xl flex gap-2 mb-4 border border-yellow-200">
        <button id="mode-tts-btn" onclick="switchMode('tts')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 bg-white text-yellow-800 shadow-sm">
            <span>🗣️</span> 원어민 TTS 모드
        </button>
        <button id="mode-music-btn" onclick="switchMode('music')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 text-yellow-700 hover:text-yellow-900">
            <span>🎸</span> 실음원(유튜브) 싱크 모드
        </button>
    </div>

    <!-- YouTube Player Integration Panel -->
    <div id="music-player-panel" class="hidden w-full max-w-xl bg-white border border-yellow-200 p-4 rounded-3xl shadow-sm mb-4 flex flex-col gap-3">
        <div class="youtube-container">
            <!-- 유튜브 플레이어 iframe이 API를 통해 여기에 동적 로드됩니다. -->
            <div id="yt-player"></div>
        </div>
        <div class="flex items-center justify-between px-2">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2.5 w-2.5">
                    <span id="sync-ping" class="absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span id="sync-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                </span>
                <span class="text-xs font-bold text-gray-500 font-cute-en" id="music-status-text">음원 정지 상태</span>
            </div>
            <button onclick="syncToCurrentCard()" class="text-xs bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold px-3 py-1.5 rounded-lg border border-yellow-200 transition-all active:scale-95">
                🔄 현재 카드에 오디오 싱크 맞추기
            </button>
        </div>
    </div>

    <!-- Flashcard Area -->
    <main class="w-full max-w-xl aspect-[16/10] perspective-1000 my-auto">
        <div id="card" class="card-inner" onclick="flipCard()">
            
            <!-- Front (English Lyric) -->
            <div class="card-face card-front">
                <div class="absolute top-4 left-6 text-xs font-bold text-yellow-500 uppercase tracking-widest font-cute-en">
                    English Lyric
                </div>
                <!-- Speaker Active Wave Ring -->
                <div class="absolute top-4 right-6 flex items-center gap-1.5 bg-yellow-50 px-3 py-1 rounded-full border border-yellow-100">
                    <span class="relative flex h-2 w-2">
                        <span id="active-pulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                        <span id="active-dot" class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                    </span>
                    <span id="active-mode-label" class="text-[10px] font-bold text-yellow-600 uppercase font-cute-en">TTS Active</span>
                </div>

                <div class="text-center px-4">
                    <p id="front-text" class="text-2xl md:text-3.5xl font-bold text-gray-800 leading-snug tracking-wide font-cute-en"></p>
                </div>

                <!-- Replay / Seek Audio Button -->
                <button id="card-audio-btn" onclick="event.stopPropagation(); handleCardAudioAction();" class="absolute bottom-6 p-4 rounded-full bg-yellow-50 hover:bg-yellow-100 text-yellow-600 transition-all hover:scale-110 active:scale-95 shadow-md flex items-center gap-2" title="이 구간부터 노래 듣기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span id="audio-btn-label" class="text-xs font-bold uppercase tracking-wider font-cute-en">Replay</span>
                </button>
            </div>

            <!-- Back (Korean Translation) -->
            <div class="card-face card-back">
                <div class="absolute top-4 left-6 text-xs font-bold text-yellow-800 uppercase tracking-widest font-cute-en">
                    Translation
                </div>
                <div class="text-center px-6 w-full">
                    <p id="back-text" class="text-3xl md:text-5xl font-bold text-yellow-950 leading-relaxed font-cute-ko break-keep"></p>
                </div>
                <!-- Replay / Seek Audio Button also on back for convenience -->
                <button onclick="event.stopPropagation(); handleCardAudioAction();" class="absolute bottom-6 p-4 rounded-full bg-white/95 hover:bg-white text-yellow-700 transition-all hover:scale-110 active:scale-95 shadow-md flex items-center gap-2" title="이 구간부터 노래 듣기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="text-xs font-bold uppercase tracking-wider font-cute-en">Play From Here</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Control Panels & Keyboard shortcuts -->
    <footer class="w-full max-w-xl flex flex-col items-center gap-4 mt-4 mb-2">
        
        <!-- Navigation Buttons -->
        <div class="flex items-center gap-6">
            <button onclick="prevCard()" class="p-4 rounded-2xl bg-white border-2 border-yellow-300 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-400 transition-all active:scale-90 shadow-sm" title="이전 (왼쪽 화살표)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            
            <div class="px-6 py-2 bg-yellow-200/60 rounded-2xl font-bold text-yellow-800 text-sm shadow-inner font-cute-en">
                <span id="current-index" class="text-lg">1</span> / <span id="total-count" class="text-lg">44</span>
            </div>
            
            <button onclick="nextCard()" class="p-4 rounded-2xl bg-white border-2 border-yellow-300 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-400 transition-all active:scale-90 shadow-sm" title="다음 (오른쪽 화살표)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- TTS Control Panel (Visible in TTS Mode) -->
        <div id="tts-settings-panel" class="w-full bg-white/75 backdrop-blur-sm border border-yellow-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4 shadow-sm">
            <!-- Speed Control -->
            <div class="flex items-center gap-3">
                <span class="text-sm font-bold text-yellow-800 font-cute-ko">🗣️ 재생 속도</span>
                <input id="speed-range" type="range" min="0.7" max="1.2" step="0.1" value="0.9" onchange="updateSpeedLabel(this.value)" class="w-24 h-2 bg-yellow-200 rounded-lg appearance-none cursor-pointer">
                <span id="speed-label" class="text-xs font-bold text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded font-cute-en">0.9x</span>
            </div>

            <!-- Auto Play Toggle -->
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="auto-play-toggle" class="sr-only peer" checked>
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-500"></div>
                <span class="ml-3 text-sm font-bold text-yellow-800 font-cute-ko">카드를 넘기면 자동 발음 재생</span>
            </label>
        </div>

        <!-- Shortcuts Hint -->
        <div class="hidden md:flex gap-4 text-[11px] font-bold text-yellow-700 uppercase tracking-wider opacity-85 font-cute-en">
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">Space: Flip Card</span>
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">← : Prev Card</span>
            <span class="bg-yellow-200/50 px-3 py-1.5 rounded-xl border border-yellow-200 shadow-sm">→ : Next Card</span>
        </div>
        
        <!-- Mobile Hint -->
        <div class="flex md:hidden text-xs font-bold text-yellow-700 opacity-80 font-cute-ko">
            <span>💡 화면을 좌우로 스와이프해서 카드를 쉽게 넘겨보세요!</span>
        </div>
    </footer>

            { front: "Is just a yellow lemon tree", back: "그저 노란 레몬 나무뿐이야", time: 186.2 }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let speechRate = 0.9;
        let currentMode = 'tts'; // 'tts' 또는 'music'
        
        // 유튜브 플레이어 변수
        let ytPlayer = null;
        let ytReady = false;
        let ytTimer = null;
        let userSeeking = false;

        const card = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const currentIndexDisplay = document.getElementById('current-index');
        const totalCountDisplay = document.getElementById('total-count');
        const speedRange = document.getElementById('speed-range');
        const speedLabel = document.getElementById('speed-label');
        const autoPlayToggle = document.getElementById('auto-play-toggle');
        
        const modeTtsBtn = document.getElementById('mode-tts-btn');
        const modeMusicBtn = document.getElementById('mode-music-btn');
        const musicPlayerPanel = document.getElementById('music-player-panel');
        const ttsSettingsPanel = document.getElementById('tts-settings-panel');
        
        const activePulse = document.getElementById('active-pulse');
        const activeDot = document.getElementById('active-dot');
        const activeModeLabel = document.getElementById('active-mode-label');
        const audioBtnLabel = document.getElementById('audio-btn-label');
        const musicStatusText = document.getElementById('music-status-text');

        // 모바일 기기에서의 터치 스와이프 탐색 지원
        let touchStartX = 0;
        let touchEndX = 0;

        card.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        card.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const threshold = 50; // 스와이프 감도
            if (touchEndX < touchStartX - threshold) {
                nextCard();
            } else if (touchEndX > touchStartX + threshold) {
                prevCard();
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'tts') {
                // TTS 모드 활성화
                modeTtsBtn.classList.add('bg-white', 'text-yellow-800', 'shadow-sm');
                modeTtsBtn.classList.remove('text-yellow-700');
                modeMusicBtn.classList.remove('bg-white', 'text-yellow-800', 'shadow-sm');
                modeMusicBtn.classList.add('text-yellow-700');
                
                musicPlayerPanel.classList.add('hidden');
                ttsSettingsPanel.classList.remove('hidden');
                
                activePulse.classList.add('bg-yellow-400');
                activePulse.classList.remove('bg-red-400');
                activeDot.classList.add('bg-yellow-500');
                activeDot.classList.remove('bg-red-500');
                activeModeLabel.innerText = "TTS Active";
                audioBtnLabel.innerText = "Replay";
                
                // 유튜브 음악 정지
                if (ytPlayer && ytReady) {
                    ytPlayer.pauseVideo();
                }
                stopSyncTimer();
            } else {
                // 유튜브 싱크 모드 활성화
                modeMusicBtn.classList.add('bg-white', 'text-yellow-800', 'shadow-sm');
                modeMusicBtn.classList.remove('text-yellow-700');
                modeTtsBtn.classList.remove('bg-white', 'text-yellow-800', 'shadow-sm');
                modeTtsBtn.classList.add('text-yellow-700');
                
                musicPlayerPanel.classList.remove('hidden');
                ttsSettingsPanel.classList.add('hidden');
                
                activePulse.classList.remove('bg-yellow-400');
                activePulse.classList.add('bg-red-400');
                activeDot.classList.remove('bg-yellow-500');
                activeDot.classList.add('bg-red-500');
                activeModeLabel.innerText = "Sync Active";
                audioBtnLabel.innerText = "Listen From Here";

                // 유튜브 플레이어가 로드되지 않았다면 동적 생성
                loadYouTubePlayer();
                startSyncTimer();
            }
            updateCard(false); // 카드 상태 리프레시 (음성 무조건 재생 방지)
        }

        // 유튜브 iframe 플레이어 API 스크립트 비동기 로드
        function loadYouTubePlayer() {
            if (window.YT) return; // 이미 선언되어 있으면 중복 로드 방지
            
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        // 유튜브 API 준비 완료 이벤트 핸들러
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: 'bRmvUC7B_zs', // Fools Garden - Lemon Tree (2025 Remaster 공식 오디오 ID)
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0,
                    'origin': window.location.origin || '*' // 에러 153 해결을 위한 현재 사이트의 출처 전달
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            ytReady = true;
            musicStatusText.innerText = "오디오 준비 완료";
        }

        function onPlayerStateChange(event) {
            const syncPing = document.getElementById('sync-ping');
            const syncDot = document.getElementById('sync-dot');

            if (event.data == YT.PlayerState.PLAYING) {
                musicStatusText.innerText = "실시간 싱크 재생 중 🎵";
                syncPing.classList.add('animate-ping');
                syncDot.classList.add('bg-red-500');
                startSyncTimer();
            } else {
                if (event.data == YT.PlayerState.PAUSED) {
                    musicStatusText.innerText = "싱크 일시정지";
                } else if (event.data == YT.PlayerState.ENDED) {
                    musicStatusText.innerText = "재생 종료";
                }
                syncPing.classList.remove('animate-ping');
                stopSyncTimer();
            }
        }

        // 유튜브 실시간 싱크 체크 타이머 시작
        function startSyncTimer() {
            if (ytTimer) clearInterval(ytTimer);
            ytTimer = setInterval(() => {
                if (ytPlayer && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    const currentTime = ytPlayer.getCurrentTime();
                    findAndSyncCardByTime(currentTime);
                }
            }, 300);
        }

        function stopSyncTimer() {
            if (ytTimer) {
                clearInterval(ytTimer);
                ytTimer = null;
            }
        }

        function findAndSyncCardByTime(seconds) {
            let matchedIndex = 0;
            // 시간에 알맞은 최적의 카드 찾기
            for (let i = 0; i < lyrics.length; i++) {
                if (seconds >= lyrics[i].time) {
                    matchedIndex = i;
                } else {
                    break;
                }
            }
            if (matchedIndex !== currentIndex) {
                currentIndex = matchedIndex;
                updateCardVisualsOnly();
            }
        }

        // 사용자가 현재 떠 있는 카드 시점에 맞추어 싱크 수동 조절
        function syncToCurrentCard() {
            if (ytPlayer && ytReady) {
                const targetTime = lyrics[currentIndex].time;
                ytPlayer.seekTo(targetTime, true);
                if (ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                    ytPlayer.playVideo();
                }
            }
        }

        // TTS 낭독 기능
        function playTTS(text) {
            if (!('speechSynthesis' in window)) return;
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = speechRate;
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Google'));
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        // 플래시카드 하단 오디오 버튼 조작 로직 (재생 혹은 해당 유튜브 시점 이동)
        function handleCardAudioAction() {
            if (currentMode === 'tts') {
                playTTS(lyrics[currentIndex].front);
            } else {
                // 유튜브 싱크 모드일 때: 이 가사가 나오는 시점으로 동영상 즉각 워프(Seek to)
                if (ytPlayer && ytReady) {
                    const targetTime = lyrics[currentIndex].time;
                    ytPlayer.seekTo(targetTime, true);
                    ytPlayer.playVideo();
                }
            }
        }

        function updateSpeedLabel(val) {
            speechRate = parseFloat(val);
            speedLabel.innerText = val + 'x';
        }

        function updateCard(shouldPlayTTS = true) {
            isFlipped = false;
            card.classList.remove('is-flipped');
            
            frontText.innerText = lyrics[currentIndex].front;
            backText.innerText = lyrics[currentIndex].back;
            
            currentIndexDisplay.innerText = currentIndex + 1;
            totalCountDisplay.innerText = lyrics.length;

            if (currentMode === 'tts' && autoPlayToggle.checked && shouldPlayTTS) {
                playTTS(lyrics[currentIndex].front);
            }
        }

        // 싱크 재생 시 부드러운 카드 텍스트만 업데이트 (뒤집힘 유지 및 TTS 중복 호출 방지)
        function updateCardVisualsOnly() {
            frontText.innerText = lyrics[currentIndex].front;
            backText.innerText = lyrics[currentIndex].back;
            
            currentIndexDisplay.innerText = currentIndex + 1;
            totalCountDisplay.innerText = lyrics.length;
        }

        // 카드 뒤집기
        function flipCard() {
            isFlipped = !isFlipped;
            card.classList.toggle('is-flipped');
            
            if (!isFlipped && currentMode === 'tts' && autoPlayToggle.checked) {
                playTTS(lyrics[currentIndex].front);
            }
        }

        function nextCard() {
            if (currentIndex < lyrics.length - 1) {
                currentIndex++;
                updateCard();
                
                // 유튜브 모드일 경우 카드에 맞춰 실시간 싱크 맞추기 옵션 수행 가능
                if (currentMode === 'music' && ytPlayer && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    syncToCurrentCard();
                }
            } else {
                currentIndex = 0;
                updateCard();
                if (currentMode === 'music' && ytPlayer && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    syncToCurrentCard();
                }
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
                if (currentMode === 'music' && ytPlayer && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    syncToCurrentCard();
                }
            } else {
                currentIndex = lyrics.length - 1;
                updateCard();
                if (currentMode === 'music' && ytPlayer && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    syncToCurrentCard();
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        // 음성 라이브러리가 뒤늦게 로딩되는 이슈 방지
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }

        // 앱 초기 시작
        window.onload = function() {
            updateCard(true);
        }
    </script>
</body>
</html>
